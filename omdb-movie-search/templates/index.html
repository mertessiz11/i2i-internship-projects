<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineSearch — Movie Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: #ffffff0f;
      --accent: #e8c84a;
      --accent2: #e05c3a;
      --text: #f0ece0;
      --muted: #7a7870;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* HEADER */
    header {
      padding: 3rem 2rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    /* SEARCH BAR */
    .search-wrap {
      max-width: 1100px;
      margin: 2rem auto 0;
      padding: 0 2rem;
    }

    .search-box {
      display: flex;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .search-box:focus-within {
      border-color: var(--accent);
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 1.1rem 1.5rem;
      font-size: 1.05rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    .search-box input::placeholder { color: var(--muted); }

    .search-box button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      padding: 0 2rem;
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      color: #0a0a0f;
      transition: opacity 0.2s;
    }

    .search-box button:hover { opacity: 0.85; }

    /* FILTER ROW */
    .filter-row {
      max-width: 1100px;
      margin: 1rem auto 0;
      padding: 0 2rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 1rem;
      border-radius: 99px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #e8c84a12;
    }

    /* RESULTS AREA */
    .results-wrap {
      max-width: 1100px;
      margin: 2.5rem auto 4rem;
      padding: 0 2rem;
    }

    .results-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .results-meta span { color: var(--accent); }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 1.25rem;
    }

    /* CARD */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      animation: fadeUp 0.4s ease both;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #ffffff20;
      box-shadow: 0 20px 40px #00000060;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--surface);
    }

    .card-no-poster {
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 2.5rem;
    }

    .card-info {
      padding: 0.75rem;
    }

    .card-title {
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .card-type {
      background: #ffffff0a;
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      text-transform: capitalize;
      letter-spacing: 0.05em;
    }

    /* LOAD MORE */
    .load-more-wrap {
      text-align: center;
      margin-top: 2.5rem;
    }

    .load-more-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.75rem 2.5rem;
      border-radius: 99px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .load-more-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #00000090;
      backdrop-filter: blur(8px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 780px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      gap: 2rem;
      padding: 2rem;
      transform: scale(0.95);
      transition: transform 0.3s;
      position: relative;
    }

    .modal-overlay.open .modal { transform: scale(1); }

    .modal-poster {
      width: 200px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
      align-self: flex-start;
    }

    .modal-poster img { width: 100%; display: block; }

    .modal-poster-placeholder {
      width: 200px;
      height: 300px;
      background: var(--surface);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      flex-shrink: 0;
    }

    .modal-content { flex: 1; min-width: 0; }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.04em;
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }

    .modal-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .badge {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      background: #ffffff0a;
      border: 1px solid var(--border);
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .badge.highlight {
      background: #e8c84a15;
      border-color: #e8c84a40;
      color: var(--accent);
    }

    .modal-rating {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      font-weight: 500;
    }

    .modal-rating .star { color: var(--accent); }

    .modal-plot {
      font-size: 0.9rem;
      line-height: 1.7;
      color: #c0bdb0;
      margin-bottom: 1.25rem;
    }

    .modal-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .detail-item { font-size: 0.82rem; }
    .detail-label { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.1rem; }
    .detail-value { color: var(--text); }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover { color: var(--text); border-color: #ffffff30; }

    /* EMPTY / LOADING */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    .empty-state p { font-size: 1rem; }

    .spinner {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
    }

    .spinner::after {
      content: '';
      display: inline-block;
      width: 2rem;
      height: 2rem;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    @media (max-width: 600px) {
      .modal { flex-direction: column; }
      .modal-poster, .modal-poster-placeholder { width: 100%; height: auto; }
      .modal-details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">CineSearch</div>
  <div class="tagline">Powered by OMDB · Millions of titles at your fingertips</div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search movies, series, episodes..." autocomplete="off" />
    <button onclick="doSearch()">Search</button>
  </div>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setType('', this)">All</button>
  <button class="filter-btn" onclick="setType('movie', this)">Movies</button>
  <button class="filter-btn" onclick="setType('series', this)">Series</button>
  <button class="filter-btn" onclick="setType('episode', this)">Episodes</button>
</div>

<div class="results-wrap">
  <div id="resultsMeta" class="results-meta" style="display:none"></div>
  <div id="grid" class="grid"></div>
  <div id="emptyState" class="empty-state">
    <div class="icon">🎬</div>
    <p>Search for a movie, series, or episode to get started.</p>
  </div>
  <div id="spinner" class="spinner" style="display:none"></div>
  <div class="load-more-wrap">
    <button id="loadMoreBtn" class="load-more-btn" style="display:none" onclick="loadMore()">Load More</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modalContent">Loading...</div>
  </div>
</div>

<script>
  let currentQuery = '';
  let currentType = '';
  let currentPage = 1;
  let totalResults = 0;

  const input = document.getElementById('searchInput');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  function setType(type, btn) {
    currentType = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (currentQuery) doSearch();
  }

  async function doSearch() {
    currentQuery = input.value.trim();
    if (!currentQuery) return;
    currentPage = 1;
    document.getElementById('grid').innerHTML = '';
    document.getElementById('loadMoreBtn').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('resultsMeta').style.display = 'none';
    document.getElementById('spinner').style.display = 'block';
    await fetchResults();
  }

  async function loadMore() {
    currentPage++;
    await fetchResults(true);
  }

  async function fetchResults(append = false) {
    let url = `/search?q=${encodeURIComponent(currentQuery)}&page=${currentPage}`;
    if (currentType) url += `&type=${currentType}`;
    const res = await fetch(url);
    const data = await res.json();
    document.getElementById('spinner').style.display = 'none';

    if (data.Response === 'True') {
      totalResults = parseInt(data.totalResults);
      renderCards(data.Search, append);
      const meta = document.getElementById('resultsMeta');
      meta.style.display = 'block';
      meta.innerHTML = `Showing <span>${document.querySelectorAll('.card').length}</span> of <span>${totalResults}</span> results for "<span>${currentQuery}</span>"`;
      const loaded = currentPage * 10;
      document.getElementById('loadMoreBtn').style.display = loaded < totalResults ? 'inline-block' : 'none';
    } else {
      if (!append) {
        document.getElementById('emptyState').innerHTML = `<div class="icon">🔍</div><p>No results found for "<strong>${currentQuery}</strong>"</p>`;
        document.getElementById('emptyState').style.display = 'block';
      }
    }
  }

  function renderCards(movies, append) {
    const grid = document.getElementById('grid');
    movies.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.05}s`;
      card.onclick = () => openModal(m.imdbID);
      const poster = m.Poster !== 'N/A'
        ? `<img class="card-poster" src="${m.Poster}" alt="${m.Title}" loading="lazy"/>`
        : `<div class="card-no-poster">🎞️</div>`;
      card.innerHTML = `
        ${poster}
        <div class="card-info">
          <div class="card-title" title="${m.Title}">${m.Title}</div>
          <div class="card-meta">
            <span>${m.Year}</span>
            <span class="card-type">${m.Type}</span>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  async function openModal(id) {
    const overlay = document.getElementById('modalOverlay');
    overlay.classList.add('open');
    document.getElementById('modalContent').innerHTML = '<div style="padding:2rem;color:var(--muted)">Loading...</div>';

    const res = await fetch(`/movie/${id}`);
    const m = await res.json();

    const poster = m.Poster !== 'N/A'
      ? `<div class="modal-poster"><img src="${m.Poster}" alt="${m.Title}"/></div>`
      : `<div class="modal-poster-placeholder">🎞️</div>`;

    const rating = m.imdbRating !== 'N/A'
      ? `<div class="modal-rating"><span class="star">★</span> ${m.imdbRating} <span style="color:var(--muted);font-size:0.85rem">/ 10</span></div>`
      : '';

    const genres = (m.Genre || '').split(', ').map(g => `<span class="badge highlight">${g}</span>`).join('');

    document.getElementById('modalContent').innerHTML = `
      ${poster}
      <div class="modal-content">
        <div class="modal-title">${m.Title}</div>
        <div class="modal-badges">
          <span class="badge">${m.Year}</span>
          <span class="badge">${m.Rated || 'NR'}</span>
          <span class="badge">${m.Runtime || 'N/A'}</span>
          ${genres}
        </div>
        ${rating}
        <p class="modal-plot">${m.Plot || 'No plot available.'}</p>
        <div class="modal-details">
          <div class="detail-item"><div class="detail-label">Director</div><div class="detail-value">${m.Director || 'N/A'}</div></div>
          <div class="detail-item"><div class="detail-label">Writer</div><div class="detail-value">${m.Writer || 'N/A'}</div></div>
          <div class="detail-item"><div class="detail-label">Actors</div><div class="detail-value">${m.Actors || 'N/A'}</div></div>
          <div class="detail-item"><div class="detail-label">Language</div><div class="detail-value">${m.Language || 'N/A'}</div></div>
          <div class="detail-item"><div class="detail-label">Country</div><div class="detail-value">${m.Country || 'N/A'}</div></div>
          <div class="detail-item"><div class="detail-label">Box Office</div><div class="detail-value">${m.BoxOffice || 'N/A'}</div></div>
        </div>
      </div>`;
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });
</script>
</body>
</html>
